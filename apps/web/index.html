<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Incapacidades EPS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: #2a2d35;
    --border2: #3a3d47;
    --text: #e8eaf0;
    --text2: #8a8fa0;
    --text3: #5a5f72;
    --accent: #4ade80;
    --accent-dim: #1a3d28;
    --warn: #f59e0b;
    --warn-dim: #3d2e10;
    --danger: #f87171;
    --danger-dim: #3d1a1a;
    --blue: #60a5fa;
    --blue-dim: #1a2a3d;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--text2);
  }
  .logo span { color: var(--accent); }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 8px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .api-status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    display: flex;
    align-items: center;
  }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    min-height: calc(100vh - 52px);
  }

  /* Panel izquierdo - formulario */
  .panel-form {
    border-right: 1px solid var(--border);
    padding: 2rem;
    overflow-y: auto;
  }

  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .eps-selector {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 2rem;
  }
  .eps-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 8px;
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }
  .eps-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  .eps-btn:hover:not(.active) {
    border-color: var(--border2);
    color: var(--text);
  }
  .eps-btn.disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .eps-badge {
    font-size: 9px;
    color: var(--text3);
    margin-top: 3px;
  }
  .eps-btn.active .eps-badge { color: var(--accent); opacity: 0.7; }

  /* Form fields */
  .form-group {
    margin-bottom: 1rem;
  }
  label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 5px;
    letter-spacing: 0.04em;
  }
  input[type="text"],
  input[type="password"],
  input[type="number"],
  input[type="date"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus {
    border-color: var(--blue);
    background: var(--blue-dim);
  }
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  /* File upload */
  .file-drop {
    border: 1px dashed var(--border2);
    border-radius: 6px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .file-drop:hover, .file-drop.dragover {
    border-color: var(--blue);
    background: var(--blue-dim);
  }
  .file-drop input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .file-drop-icon {
    font-size: 20px;
    margin-bottom: 4px;
  }
  .file-drop-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }
  .file-drop.has-file .file-drop-text { color: var(--accent); }

  /* Submit button */
  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: #0a1f12;
    border: none;
    border-radius: 6px;
    padding: 11px;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: opacity 0.15s;
    letter-spacing: 0.04em;
  }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-submit.loading { opacity: 0.6; }

  /* Panel derecho - log */
  .panel-log {
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 0.05em;
  }
  .clear-btn:hover { border-color: var(--border2); color: var(--text2); }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .stat-val {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
  }
  .stat-val.green { color: var(--accent); }
  .stat-val.red { color: var(--danger); }
  .stat-val.yellow { color: var(--warn); }

  /* Log entries */
  .log-entries {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .log-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    align-items: start;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .log-entry.procesando { border-left: 3px solid var(--warn); }
  .log-entry.exitoso { border-left: 3px solid var(--accent); }
  .log-entry.fallido, .log-entry.error { border-left: 3px solid var(--danger); }

  .log-status-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .log-status-icon.procesando { background: var(--warn-dim); color: var(--warn); }
  .log-status-icon.exitoso { background: var(--accent-dim); color: var(--accent); }
  .log-status-icon.fallido, .log-status-icon.error { background: var(--danger-dim); color: var(--danger); }

  .log-body { min-width: 0; }
  .log-title {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .log-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .log-sub.success { color: var(--accent); }
  .log-sub.danger { color: var(--danger); }

  .log-eps {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--text3);
    white-space: nowrap;
  }

  .spinner {
    display: inline-block;
    width: 13px; height: 13px;
    border: 2px solid var(--warn-dim);
    border-top-color: var(--warn);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    color: var(--text3);
    font-family: var(--mono);
    font-size: 12px;
    gap: 8px;
  }
  .empty-icon { font-size: 28px; opacity: 0.4; }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .panel-form { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">[ <span>BOT</span> ] radicación · incapacidades — v1.1</div>
  <div class="api-status">
    <span class="status-dot" id="api-dot"></span>
    <span id="api-label">conectando...</span>
  </div>
</header>

<div class="layout">

  <!-- FORMULARIO -->
  <div class="panel-form">
    <div class="section-label">EPS destino</div>
    <div class="eps-selector">
      <div class="eps-btn active" data-eps="sura">
        SURA
        <div class="eps-badge">● activo</div>
      </div>
      <div class="eps-btn disabled" title="Próximamente">
        NUEVA EPS
        <div class="eps-badge">pronto</div>
      </div>
      <div class="eps-btn disabled" title="Próximamente">
        SANITAS
        <div class="eps-badge">pronto</div>
      </div>
    </div>

    <div class="section-label">Credenciales empleador</div>
    <div class="form-row">
      <div class="form-group">
        <label>NIT empleador</label>
        <input type="text" id="nit" placeholder="900123456">
      </div>
      <div class="form-group">
        <label>Clave portal</label>
        <input type="password" id="clave" placeholder="••••••••">
      </div>
    </div>

    <div class="divider"></div>
    <div class="section-label">Datos incapacidad</div>

    <div class="form-group">
      <label>Cédula trabajador</label>
      <input type="text" id="cedula" placeholder="12345678">
    </div>
    <div class="form-group">
      <label>N° incapacidad</label>
      <input type="text" id="num_incap" placeholder="INC-2025-00001">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha inicio</label>
        <input type="date" id="fecha_inicio">
      </div>
      <div class="form-group">
        <label>Fecha fin</label>
        <input type="date" id="fecha_fin">
      </div>
    </div>
    <div class="form-group">
      <label>Días de incapacidad</label>
      <input type="number" id="dias" placeholder="5" min="1">
    </div>

    <div class="divider"></div>
    <div class="section-label">Documentos</div>

    <div class="form-group">
      <label>PDF incapacidad *</label>
      <div class="file-drop" id="drop-incap">
        <div class="file-drop-icon">📄</div>
        <div class="file-drop-text" id="drop-incap-text">Arrastra el PDF o haz clic</div>
        <input type="file" id="pdf_incap" accept=".pdf">
      </div>
    </div>
    <div class="form-group">
      <label>Historia clínica (opcional)</label>
      <div class="file-drop" id="drop-historia">
        <div class="file-drop-icon">📋</div>
        <div class="file-drop-text" id="drop-historia-text">Solo para transcripciones</div>
        <input type="file" id="pdf_historia" accept=".pdf">
      </div>
    </div>

    <button class="btn-submit" type="button" id="btn-radicar">
      RADICAR INCAPACIDAD →
    </button>
  </div>

  <!-- LOG / RESULTADOS -->
  <div class="panel-log">
    <div class="log-header">
      <div class="section-label" style="margin:0">Radicaciones</div>
      <button class="clear-btn" type="button" id="btn-clear">LIMPIAR</button>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-val" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Exitosas</div>
        <div class="stat-val green" id="stat-ok">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Fallidas</div>
        <div class="stat-val red" id="stat-fail">0</div>
      </div>
    </div>

    <div class="log-entries" id="log-entries">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">◎</div>
        <span>Sin radicaciones aún</span>
      </div>
    </div>
  </div>

</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
